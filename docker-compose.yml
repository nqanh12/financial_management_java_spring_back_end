services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expense
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense -d expense"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-change-me}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      OAUTH2_FRONTEND_REDIRECT_URL: ${OAUTH2_FRONTEND_REDIRECT_URL:-http://localhost:3000/oauth2/callback}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000}
